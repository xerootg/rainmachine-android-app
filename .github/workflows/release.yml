name: Build & Release APK

# Builds the signed release APK on the original 2017 legacy toolchain
# (AGP 3.0.0 / Gradle 4.1 / JDK 8 / compileSdk 25 / build-tools 26.0.2) and
# publishes it to a GitHub Release.
#
# Signing is consistent on every run: the build signs with the committed
# release keystore (app/key/rainmachine.keystore, cert CN=Dragos Ana,
# SHA-256 880626568b81cf8d75dc97f745cf0d0e392329d98ec4ca6e2443b3be67f9b6c7).
# That fixed cert is what lets one build update an install of an earlier one.

on:
  push:
    tags:
      - 'v*'          # tag a commit `vX.Y.Z` to cut a release
  workflow_dispatch:  # or run it by hand (uploads an artifact, no Release)

permissions:
  contents: write     # required for softprops/action-gh-release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The SDK command-line tools (sdkmanager) need a modern JDK, so install
      # the legacy SDK packages FIRST, while the runner's default JDK is active,
      # and only switch to JDK 8 afterwards for the Gradle build itself.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install legacy SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-25" "build-tools;26.0.2"

      # Gradle 4.1 only runs on JDK 8. Setting JAVA_HOME here makes it the JDK
      # the Gradle wrapper uses for the build step below.
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Verify signing cert is the expected one
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk)
          echo "Built: $APK"
          keytool -printcert -jarfile "$APK" | grep -i 'SHA256:'
          keytool -printcert -jarfile "$APK" | grep -q \
            '88:06:26:56:8B:81:CF:8D:75:DC:97:F7:45:CF:0D:0E:39:23:29:D9:8E:C4:CA:6E:24:43:B3:BE:67:F9:B6:C7' \
            && echo "Signing cert matches the pinned RainMachine release cert." \
            || { echo "ERROR: APK signed with an unexpected certificate"; exit 1; }

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rainmachine-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          body: |
            Signed release APK built by CI on the legacy 2017 toolchain.

            **Install:** `adb install -r --bypass-low-target-sdk-block RainMachine-*.apk`
            (targetSdk is 21, so modern Android needs the bypass flag; the
            "built for an older version of Android" dialog on launch is harmless.)

            Signing cert: `CN=Dragos Ana` —
            SHA-256 `880626568b81cf8d75dc97f745cf0d0e392329d98ec4ca6e2443b3be67f9b6c7`.
            Every release is signed with this same key, so each build installs
            over the previous one.
