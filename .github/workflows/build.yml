name: Build check

# Fast safety net for the modernization work: build the debug APK on every PR
# and on pushes to master, so no change lands that breaks the build. There is
# almost no automated test coverage, so a green build is the gate.
#
# As the toolchain climbs (JDK 8 → 11 → 17, build-tools, etc.) keep the
# java-version and sdkmanager packages here in step with release.yml.

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-25" "build-tools;28.0.3"

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
